$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

# The docs app is a pure consumer of @midnite/ui (Phase 26): the graph gains the
# `ui ◀── docs` edge, joining `ui ◀── web`. It depends on NOTHING else in-repo —
# no shared/gateway/web — enforced by src/boundary.test.ts. Built with Vite (an
# SPA), so build/dev/preview override the repo's default `tsc -b` build.
dependsOn:
  - 'ui'

tasks:
  dev:
    command: 'pnpm exec vite'
    preset: 'server'
    # Vite resolves @midnite/ui to its built dist/, so build it before serving.
    deps:
      - 'root:install'
      - 'ui:build'

  build:
    command: 'pnpm exec vite build'
    # The bundle imports the built @midnite/ui (dist/ + token CSS), so build it first.
    deps:
      - 'root:install'
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      # The Changelog page bundles the repo-root CHANGELOG via `?raw`
      # (src/content/product-docs.tsx). It lives OUTSIDE this project, so without
      # declaring it moon treats a changelog-only edit as a cache hit and deploys a
      # stale bundle — which is exactly how the old private-repo release links kept
      # surviving on GitHub Pages after CHANGELOG.md was fixed to point at the
      # public mirror. Workspace-relative (leading `/`) so it busts the cache.
      - '/CHANGELOG.md'
    outputs:
      - 'dist'

  preview:
    command: 'pnpm exec vite preview'
    preset: 'server'
    deps:
      - 'ui:build'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc resolves @midnite/ui via its dist .d.ts, so build it first.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig.json'

  test:
    command: 'pnpm exec vitest run'
    # RTL tests import the built @midnite/ui (dist), so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - '/eslint.config.mjs'
