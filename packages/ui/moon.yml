$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

# @midnite/ui is a LEAF: it depends on nothing else in the repo (Phase 25 §1) —
# not even `shared`. So there is no `dependsOn`, and the boundary test in
# src/boundary.test.ts enforces the rule stays true.
#
# This is the one package built with Vite library mode instead of `tsc -b`
# (Phase 25 §7): Vite bundles JSX/CSS/assets, vite-plugin-dts emits the types,
# and typechecking still runs through `tsc --noEmit`.
#
# Theme D adds the `storybook` (dev server) + `build-storybook` (static catalog)
# tasks alongside the Storybook deps + `.storybook` config, and wires the story
# browser-test inputs into `test` (which vitest.config.ts now owns).
tasks:
  build:
    command: 'pnpm exec vite build'
    deps:
      - 'root:install'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
    outputs:
      - 'dist'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  test:
    command: 'pnpm exec vitest run'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      # Stories run as browser tests, so Storybook config (preview decorators,
      # addons) + the Tailwind/PostCSS pipeline must invalidate the test cache.
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'

  storybook:
    command: 'pnpm exec storybook dev -p 6007'
    preset: 'server'

  build-storybook:
    command: 'pnpm exec storybook build'
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
    outputs:
      - 'storybook-static'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - '/eslint.config.mjs'
