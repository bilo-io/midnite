$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'gateway'
  - 'shared'
  # `development` scope so moon's package.json sync writes @midnite/web to
  # devDependencies, not dependencies. The web UI ships as a prebuilt static
  # export via electron-builder's extraResources (build-staging/web) — desktop
  # never imports it as a module — so it must NOT be a production dependency, or
  # electron-builder walks the workspace symlink into packages/web + its
  # @midnite/* deps and dies on sibling paths (packages/shared/dist/.tsbuildinfo).
  - id: 'web'
    scope: 'development'

tasks:
  build:
    command: 'pnpm exec tsc -b'
    deps:
      - 'root:install'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc --noEmit resolves gateway/web/shared via project references but does
    # not build them, so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'src/**/*'
      - 'scripts/**/*'
      - '/eslint.config.mjs'

  # Only the electron-free modules (src/updates/*) are unit-tested — anything that
  # imports `electron`/`electron-updater` can't run outside the Electron runtime.
  # See vitest.config.ts. Runs in `moon ci` (plain node; no Electron binary).
  test:
    command: 'pnpm exec vitest run'
    deps:
      - 'root:install'
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'

  # Rebuild native deps (better-sqlite3, node-pty) against Electron's ABI —
  # SCOPED to the staged prod tree (`-m build-staging/gateway`) so it can only
  # ever touch that isolated `pnpm deploy` copy, never the workspace's shared
  # hoisted binaries (rebuilding those for Electron's ABI 130 breaks the gateway
  # + node-based tests that load the same NODE_MODULE_VERSION-127 binaries).
  # Run `desktop:stage` first so build-staging/gateway/node_modules exists.
  rebuild:
    command: 'pnpm exec electron-rebuild -m build-staging/gateway -f -w better-sqlite3 -w node-pty'
    options:
      runInCI: false

  # Dev: boots the gateway as a child + loads the Next dev server (MIDNITE_WEB_URL).
  start:
    command: 'pnpm exec electron .'
    preset: 'server'

  # Produce the macOS dmg/zip. Requires gateway:build + web:build (static export)
  # and a prior `rebuild` for the current arch.
  package:
    command: 'pnpm exec electron-builder --mac --config electron-builder.yml'
    deps:
      - '~:build'
      - 'gateway:build'
      - 'web:build'
    # macOS-only release packaging (needs the Electron binary + dmg-license).
    # Built by the tag-triggered release workflow on macOS runners — never in
    # `moon ci` on Linux, where dmg-license is absent.
    options:
      runInCI: false
    outputs:
      - 'build'
