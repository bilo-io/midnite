appId: earth.ekko.midnite
productName: midnite
directories:
  output: build
  buildResources: resources

# Predictable, version- and arch-stamped asset names on every OS, so the
# marketing site's download manifest can link them directly. Matches the macOS
# default (midnite-<version>-<arch>.dmg) and extends the scheme to win/linux.
artifactName: ${productName}-${version}-${arch}.${ext}

# Only the Electron main + preload go in the app asar; the gateway and web export
# ride along as on-disk extraResources (native .node files can't load from asar,
# and this keeps the layout simple).
files:
  - dist/**/*
  - package.json
  # Workspace deps are symlinked into node_modules (@midnite/gateway, @midnite/shared);
  # electron-builder follows those symlinks into the asar and fails on their
  # sibling-path files. The gateway runs from extraResources (not the asar) and
  # @midnite/shared is type-only, so neither is needed inside the asar.
  - '!node_modules/@midnite/**'

# Every extraResources source lives under build-staging/ INSIDE packages/desktop.
# electron-builder 25.x runs the asarUnpack (**/*.node) filter over extraResources
# and rejects any `from:` outside the app dir with "must be under packages/desktop/",
# so sibling paths like ../gateway/* or ../web/out don't work. `pnpm run stage`
# (scripts/stage-gateway.mjs) populates build-staging/{gateway,web} before packaging;
# CI does the same (.github/workflows/release.yml). See README "Packaging".
extraResources:
  - from: build-staging/gateway/dist
    to: gateway/dist
    # tsc -b leaves a .tsbuildinfo manifest in dist that electron-builder trips on
    # (and it's not needed at runtime), so drop it from the copy.
    filter:
      - '**/*'
      - '!**/*.tsbuildinfo'
  - from: build-staging/gateway/drizzle
    to: gateway/drizzle
  # The gateway reads its own version at runtime (portability.service.js does
  # `require("../../package.json")`, resolving to Resources/gateway/package.json).
  # pnpm deploy stages this file; without copying it in, the gateway crashes on
  # boot with "Cannot find module '../../package.json'" and the app shows
  # "gateway did not become healthy".
  - from: build-staging/gateway/package.json
    to: gateway/package.json
  # NB: the gateway hooks (dist/terminal/hooks/*.cjs) are already copied by the
  # `dist → gateway/dist` entry above. Do NOT add a second entry for them — a
  # second copy to the same destination makes electron-builder's hard-link step
  # fail with EEXIST on CI (it copied fine locally, masking the bug).
  # A flat, symlink-free production node_modules for the gateway, produced by
  # `pnpm deploy` + electron-rebuilt for this arch (see stage-gateway.mjs).
  - from: build-staging/gateway/node_modules
    to: gateway/node_modules
  # The Next.js static export (output: 'export'), staged from packages/web/out.
  - from: build-staging/web
    to: web

# The app asar carries no native modules of its own — the gateway's native deps
# (better-sqlite3, node-pty) are electron-rebuilt in `pnpm run stage` and ride
# along as extraResources. So skip electron-builder's own @electron/rebuild pass,
# which otherwise walks pnpm's virtual store (node_modules/.pnpm) and dies on
# dangling/optional entries like @fastify/forwarded.
npmRebuild: false

asar: true
asarUnpack:
  - '**/*.node'

# Re-assert +x on node-pty's spawn-helper after packaging (it can lose the bit).
afterPack: scripts/afterpack.cjs

# Env-gated notarization (macOS). Runs after electron-builder's own signing step;
# no-ops unless APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are all in
# the environment, so unsigned local/CI builds still succeed. See scripts/notarize.cjs.
afterSign: scripts/notarize.cjs

# electron-updater feed (Phase 71 Theme E). electron-builder writes the app's
# app-update.yml from this block and, on a publish/release build, emits the update
# metadata (latest-mac.yml / latest.yml / latest-linux.yml + *.blockmap) the running
# app polls. Points at the PUBLIC downloads repo so anonymous update checks resolve
# (the release workflow uploads the installers + these feed files there).
publish:
  provider: github
  owner: bilo-io
  repo: midnite-app
  releaseType: release

mac:
  category: public.app-category.developer-tools
  # Apple-Silicon only (see release.yml matrix): x64 native modules would need an
  # Intel runner to rebuild correctly, so we don't ship an Intel build.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: resources/icon.icns
  # Required for notarization; harmless while unsigned.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # Code signing is env-gated (Phase 71 Theme E — see README "Code signing & auto-update"):
  #   • Cert present (CSC_LINK + CSC_KEY_PASSWORD): electron-builder signs the .app;
  #     the afterSign hook (scripts/notarize.cjs) notarizes when APPLE_ID /
  #     APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are also set. A signed +
  #     notarized build is what electron-updater requires to install.
  #   • No cert: the release workflow sets CSC_IDENTITY_AUTO_DISCOVERY=false so
  #     electron-builder cleanly produces an UNSIGNED build (afterpack.cjs ad-hoc
  #     signs it so it still launches locally). Updates can't install across
  #     unsigned builds — real signing is the golive prerequisite.
  # `notarize: false` disables the built-in notarizer so our env-gated hook owns it.
  notarize: false

win:
  # Unsigned NSIS installer (x64). Triggers a SmartScreen warning until signed.
  target:
    - target: nsis
      arch:
        - x64
  # electron-builder generates the .ico from this 512px png.
  icon: resources/icon.png

linux:
  # Portable AppImage (x64) — runs on most distros with no install step.
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  icon: resources/icon.png

# Auto-update later: the `zip` target + a `publish:` block (GitHub provider) is
# all electron-updater needs; add autoUpdater.checkForUpdatesAndNotify() in main.
