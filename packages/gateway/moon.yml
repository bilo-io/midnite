$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'shared'

tasks:
  build:
    command: 'pnpm exec tsc -b'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm exec tsx watch src/main.ts'
    preset: 'server'

  start:
    command: 'node dist/main.js'
    preset: 'server'

  test:
    command: 'pnpm exec vitest run'
    inputs:
      - 'src/**/*'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
