$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'shared'

tasks:
  build:
    # tsc -b ignores non-.ts assets, so copy the hook scripts into dist after
    # compiling — the runtime resolver (resolveHookScriptPath) and the packaged
    # desktop build both expect them beside the compiled output. `script` (not
    # `command`) because moon only allows shell chaining via script.
    script: "pnpm exec tsc -b && node -e \"const fs=require('node:fs');const s='src/terminal/hooks',d='dist/terminal/hooks';fs.mkdirSync(d,{recursive:true});for(const f of fs.readdirSync(s))if(f.endsWith('.cjs'))fs.copyFileSync(s+'/'+f,d+'/'+f)\""
    deps:
      - 'root:install'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm exec tsx watch src/main.ts'
    preset: 'server'
    deps:
      - 'root:install'
    options:
      # Auto-load the gitignored repo-root .env (SSO/JWT secrets etc.) so
      # `moon run :dev` / `gateway:dev` boot with auth configured without needing
      # to `source .env` in the shell first. Dev-only — CI never runs `dev`, and
      # in prod you export env vars (or use `start`), so a missing .env is harmless.
      envFile: '/.env'

  start:
    command: 'node dist/main.js'
    preset: 'server'

  test:
    command: 'pnpm exec vitest run'
    # Imports the built @midnite/shared (dist), so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'

  test-coverage:
    # Phase 10 F2 — run tests with v8 coverage. Prints a text summary and writes
    # lcov + json-summary to coverage/ for CI artifact upload. Runs separately
    # from `test` to keep the default gate fast.
    command: 'pnpm exec vitest run --coverage'
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc --noEmit resolves shared via project references but doesn't build it.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'src/**/*'
      - '/eslint.config.mjs'
