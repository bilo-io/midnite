$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'shared'

tasks:
  build:
    command: 'pnpm exec tsc -b'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm exec tsx watch src/index.ts'
    preset: 'server'
