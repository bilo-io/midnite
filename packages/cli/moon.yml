$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'shared'
  # serve boots the gateway in-process, so it must build first.
  - 'gateway'

tasks:
  build:
    command: 'pnpm exec tsc -b'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm exec tsx watch src/index.ts'
    preset: 'server'

  test:
    command: 'pnpm exec vitest run'
    inputs:
      - 'src/**/*'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
