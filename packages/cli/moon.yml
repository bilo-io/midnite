$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

dependsOn:
  - 'shared'
  # serve boots the gateway in-process, so it must build first.
  - 'gateway'

tasks:
  build:
    command: 'pnpm exec tsc -b'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm exec tsx watch src/index.ts'
    preset: 'server'

  test:
    command: 'pnpm exec vitest run'
    # Imports the built @midnite/shared (dist), so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc --noEmit resolves shared via project references but doesn't build it.
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'src/**/*'
      - '/eslint.config.mjs'
