$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

dependsOn:
  - 'shared'

tasks:
  dev:
    command: 'pnpm exec next dev -p 3000'
    preset: 'server'

  build:
    command: 'pnpm exec next build'
    inputs:
      - 'app/**/*'
      - 'next.config.mjs'
      - 'tsconfig.json'
    outputs:
      - '.next'

  start:
    command: 'pnpm exec next start -p 3000'
    preset: 'server'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tsconfig.json'

  storybook:
    command: 'pnpm exec storybook dev -p 6006'
    preset: 'server'

  build-storybook:
    command: 'pnpm exec storybook build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
    outputs:
      - 'storybook-static'
