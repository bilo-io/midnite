$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

dependsOn:
  - 'shared'
  - 'shell'
  - 'ui'

tasks:
  dev:
    command: 'pnpm exec next dev -p 3000'
    preset: 'server'
    # Next resolves @midnite/shared, @midnite/ui and @midnite/shell to their built
    # dist/, so a stale (or missing) build serves the app undefined exports — or
    # fails to resolve the package entirely (Can't resolve '@midnite/shell').
    # (Re)build all three before starting the dev server.
    deps:
      - 'root:install'
      - 'shared:build'
      - 'ui:build'
      - 'shell:build'

  build:
    command: 'pnpm exec next build'
    # next build resolves @midnite/shared to its built dist/, so build it first.
    deps:
      - 'root:install'
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'public/**/*'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
    # output: 'export' writes the static site to out/ (consumed by @midnite/desktop).
    outputs:
      - '.next'
      - 'out'

  # Phase 72 D — hosted "server" build: MIDNITE_WEB_TARGET=server drops
  # output:'export' so the /api/auth/* BFF route handlers build + run. This is the
  # artifact a hosted deploy consumes (`next start`); the default `build` above
  # stays static so desktop packaging is byte-for-byte unchanged. Emits only .next
  # (no out/), since there is no static export in server mode.
  build-server:
    command: 'pnpm exec next build'
    env:
      MIDNITE_WEB_TARGET: 'server'
    deps:
      - 'root:install'
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'public/**/*'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
    # Own distDir (next.config.mjs) so this never races the static `build`'s .next.
    outputs:
      - '.next-server'

  start:
    command: 'pnpm exec next start -p 3000'
    preset: 'server'
    # `next start` must read the same distDir the server build wrote (.next-server).
    env:
      MIDNITE_WEB_TARGET: 'server'
    deps:
      - 'shared:build'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc --noEmit resolves shared via project references but doesn't build it.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      # tsconfig's `**/*.ts` glob also typechecks these, so changes must bust the cache.
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - '/eslint.config.mjs'

  test:
    command: 'pnpm exec vitest run'
    # Tests import the built @midnite/shared (dist), so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      # Stories run as browser tests, so Storybook config changes (preview
      # decorators, addons) must invalidate the test cache too.
      - '.storybook/**/*'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

  e2e:
    # `--project=chromium` runs only the flow specs; the screenshot-capture
    # project is a sibling task (`web:screenshots`) so e2e stays fast.
    command: 'pnpm exec playwright test --project=chromium'
    # Playwright boots its own gateway (tsx) + Next dev server, so the workspace
    # deps (shared, ui) must be built first. Heavy + spawns servers, so it stays
    # out of `moon ci` (runInCI: false) and out of the default `:test` gate — a
    # dedicated CI job is Phase 10 Theme F. Run it with `moon run web:e2e`.
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'

  screenshots:
    # Phase 10 Theme E1+E2 — screenshot capture + visual regression. Runs two projects:
    #   - `screenshots`: key app pages (1440×900, light+dark) — writes preview PNGs to
    #     e2e/__shots__/ (gitignored, E1) AND asserts committed baselines (E2)
    #   - `stories`: every Storybook story (1280×900, light+dark), SB dev on :6007 (E1)
    # Heavy + spawns servers; kept out of moon ci. CI artifact upload is Theme E3.
    # To regenerate baselines: `--update-snapshots` via Docker (see pages.shots.ts).
    command: 'pnpm exec playwright test --project=screenshots --project=stories'
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - '.storybook/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - 'e2e/__screenshots__/**'

  test-coverage:
    # Phase 10 F2 — run tests with v8 coverage. Only the `unit` project
    # contributes (browser tests excluded). Prints a text summary and writes
    # lcov + json-summary to coverage/ for CI artifact upload.
    command: 'pnpm exec vitest run --coverage --project=unit'
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'vitest.config.ts'

  bundle-report:
    command: 'pnpm exec env ANALYZE=true next build'
    deps:
      - 'root:install'
      - '^:build'
    options:
      cache: false
      runInCI: false

  clean:
    command: 'rm -rf .next out'
    options:
      cache: false
      runInCI: false

  storybook:
    command: 'pnpm exec storybook dev -p 6006'
    preset: 'server'
    deps:
      - 'shared:build'
      - 'ui:build'

  build-storybook:
    command: 'pnpm exec storybook build'
    # Storybook bundles components that import the built @midnite/shared.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
    outputs:
      - 'storybook-static'
