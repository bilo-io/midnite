$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

dependsOn:
  - 'shared'
  - 'ui'

tasks:
  dev:
    command: 'pnpm exec next dev -p 3000'
    preset: 'server'
    # Next resolves @midnite/shared and @midnite/ui to their built dist/, so a
    # stale (or missing) build serves the app undefined exports — or fails to
    # resolve @midnite/ui/styles. (Re)build both before starting the dev server.
    deps:
      - 'root:install'
      - 'shared:build'
      - 'ui:build'

  build:
    command: 'pnpm exec next build'
    # next build resolves @midnite/shared to its built dist/, so build it first.
    deps:
      - 'root:install'
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'public/**/*'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
    # output: 'export' writes the static site to out/ (consumed by @midnite/desktop).
    outputs:
      - '.next'
      - 'out'

  start:
    command: 'pnpm exec next start -p 3000'
    preset: 'server'
    deps:
      - 'shared:build'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    # tsc --noEmit resolves shared via project references but doesn't build it.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      # tsconfig's `**/*.ts` glob also typechecks these, so changes must bust the cache.
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - '/eslint.config.mjs'

  test:
    command: 'pnpm exec vitest run'
    # Tests import the built @midnite/shared (dist), so build upstream deps first.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      # Stories run as browser tests, so Storybook config changes (preview
      # decorators, addons) must invalidate the test cache too.
      - '.storybook/**/*'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

  e2e:
    # `--project=chromium` runs only the flow specs; the screenshot-capture
    # project is a sibling task (`web:screenshots`) so e2e stays fast.
    command: 'pnpm exec playwright test --project=chromium'
    # Playwright boots its own gateway (tsx) + Next dev server, so the workspace
    # deps (shared, ui) must be built first. Heavy + spawns servers, so it stays
    # out of `moon ci` (runInCI: false) and out of the default `:test` gate — a
    # dedicated CI job is Phase 10 Theme F. Run it with `moon run web:e2e`.
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'

  screenshots:
    # Phase 10 Theme E1+E2 — screenshot capture + visual regression. Drives the
    # same Playwright webServer (gateway + Next dev) as `web:e2e` but runs only
    # the `screenshots` project: writes preview PNGs to e2e/__shots__/ (gitignored)
    # AND asserts against committed baselines in e2e/__screenshots__/ (E2).
    # Heavy + spawns servers; kept out of moon ci. A dedicated CI job runs this
    # (Theme F1). To regenerate baselines: run --update-snapshots via Docker (see
    # comment in pages.shots.ts).
    command: 'pnpm exec playwright test --project=screenshots'
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'e2e/**/*'
      - 'playwright.config.ts'
      - 'e2e/__screenshots__/**'

  test-coverage:
    # Phase 10 F2 — run tests with v8 coverage. Only the `unit` project
    # contributes (browser tests excluded). Prints a text summary and writes
    # lcov + json-summary to coverage/ for CI artifact upload.
    command: 'pnpm exec vitest run --coverage --project=unit'
    deps:
      - '^:build'
    options:
      runInCI: false
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'vitest.config.ts'

  bundle-report:
    command: 'pnpm exec env ANALYZE=true next build'
    deps:
      - 'root:install'
      - '^:build'
    options:
      cache: false
      runInCI: false

  clean:
    command: 'rm -rf .next out'
    options:
      cache: false
      runInCI: false

  storybook:
    command: 'pnpm exec storybook dev -p 6006'
    preset: 'server'
    deps:
      - 'shared:build'
      - 'ui:build'

  build-storybook:
    command: 'pnpm exec storybook build'
    # Storybook bundles components that import the built @midnite/shared.
    deps:
      - '^:build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
    outputs:
      - 'storybook-static'
