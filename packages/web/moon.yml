$schema: 'https://moonrepo.dev/schemas/project.json'
language: 'typescript'

dependsOn:
  - 'shared'

tasks:
  dev:
    command: 'pnpm exec next dev -p 3000'
    preset: 'server'
    # Next resolves @midnite/shared to its built dist/, so a stale build serves
    # the app undefined exports. (Re)build shared before starting the dev server.
    deps:
      - 'shared:build'

  build:
    command: 'pnpm exec next build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'public/**/*'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
    # output: 'export' writes the static site to out/ (consumed by @midnite/desktop).
    outputs:
      - '.next'
      - 'out'

  start:
    command: 'pnpm exec next start -p 3000'
    preset: 'server'
    deps:
      - 'shared:build'

  typecheck:
    command: 'pnpm exec tsc --noEmit'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tsconfig.json'

  lint:
    command: 'pnpm exec eslint .'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - '/eslint.config.mjs'

  storybook:
    command: 'pnpm exec storybook dev -p 6006'
    preset: 'server'
    deps:
      - 'shared:build'

  build-storybook:
    command: 'pnpm exec storybook build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'lib/**/*'
      - 'stories/**/*'
      - '.storybook/**/*'
      - 'tailwind.config.ts'
      - 'postcss.config.mjs'
    outputs:
      - 'storybook-static'
