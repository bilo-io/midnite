name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # moon needs history to detect affected projects against the base.
          fetch-depth: 0

      - name: Install proto
        run: |
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          echo "$HOME/.proto/bin" >> "$GITHUB_PATH"
          echo "$HOME/.proto/shims" >> "$GITHUB_PATH"

      - name: Install pinned toolchain (node, pnpm, moon)
        run: proto install

      - name: Install dependencies
        # Skip the Electron binary download — CI runs typecheck/test/build, not a
        # desktop package, and the binary is large + macOS-specific.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium (Storybook stories run as browser tests in web:test)
        run: pnpm exec playwright install --with-deps chromium

      - name: moon ci (typecheck + test + build + lint)
        run: moon ci
