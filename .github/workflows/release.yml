name: Release

# Push a version tag (e.g. v0.1.0) to build the desktop app on every OS and
# publish a GitHub Release with the installers to the PUBLIC downloads repo
# (bilo-io/midnite-app). This repo is private, so its own release assets aren't
# anonymously downloadable — the public repo is where the download links resolve.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple-Silicon only: correct x64 native modules need a real macos-13
          # (Intel) runner, whose queue times were unreliable — dropped the
          # mac-x64 job and build arm64-only Macs (electron-builder.yml
          # mac.target arch: [arm64]).
          - { os: macos-14, label: mac-arm64, eb: '--mac --arm64' }
          # windows-2022 (not windows-latest=2025): @electron/node-gyp's Visual
          # Studio probe overflows node-gyp's stdout maxBuffer on the 2025 image
          # ("Could not find any Visual Studio installation"), failing the native
          # rebuild. VS 2022 on the 2022 image detects cleanly.
          - { os: windows-2022, label: win-x64, eb: '--win --x64' }
          - { os: ubuntu-latest, label: linux-x64, eb: '--linux --x64' }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # A tag push checks out detached HEAD with no local `main` ref; moon's
      # touched-files lookup (vcs.defaultBranch = main) needs one to merge-base
      # against. fetch-depth:0 gives us origin/main to point it at.
      - name: Make moon's default branch resolvable
        shell: bash
        run: git branch -f main origin/main

      # Cross-platform proto + pinned node/pnpm/moon (from .prototools), cached.
      # Replaces the bash-only curl installer, which doesn't work on Windows.
      - name: Set up toolchain (proto + node/pnpm/moon)
        uses: moonrepo/setup-toolchain@v0
        with:
          # Runs `proto install` so the .prototools-pinned node/pnpm/moon are
          # materialized (puts pnpm on PATH for the install step below).
          auto-install: true

      # Unlike ci.yml we DO download the Electron binary — it's needed to package
      # and to electron-rebuild the gateway's native deps for this arch.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build gateway + web (static export)
        run: moon run gateway:build web:build

      - name: Stage gateway prod deps (deploy + electron-rebuild for this arch)
        run: pnpm --filter @midnite/desktop run stage

      # Signing env-gate (Phase 71 Theme E). CRITICAL: electron-builder treats an
      # EMPTY-string CSC_LINK as "a certificate to import", resolves the empty path
      # to the cwd (a directory) and dies with "packages/desktop not a file" — BEFORE
      # CSC_IDENTITY_AUTO_DISCOVERY is ever consulted. GitHub expands an unset secret
      # to an empty string, so passing `CSC_LINK: ${{ secrets.CSC_LINK }}` directly
      # poisons every unsigned build (this is what silently blocked v0.2.0's macOS
      # leg). So export the signing vars into $GITHUB_ENV ONLY when a cert is really
      # configured; otherwise leave CSC_LINK unset and electron-builder produces a
      # clean unsigned build. Populate the CSC_*/APPLE_* secrets to ship signed +
      # notarized builds; see packages/desktop/README.md.
      - name: Configure macOS code-signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            {
              echo "CSC_LINK<<__MIDNITE_EOF__"
              echo "$CSC_LINK"
              echo "__MIDNITE_EOF__"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
            echo "macOS code-signing: certificate present → signed build."
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "macOS code-signing: no certificate → clean unsigned build."
          fi

      # `--publish never`: electron-builder still generates the electron-updater
      # feed files (latest*.yml + *.blockmap) from the `publish:` block, but does
      # NOT auto-upload them — the `release` job below publishes everything to the
      # PUBLIC downloads repo via a cross-repo PAT (the default GITHUB_TOKEN can't).
      # CSC_* are inherited from the signing step above (unset when no cert). APPLE_*
      # drive the afterSign notarize hook when all three are set; empty is fail-soft
      # (the hook no-ops), and electron-builder's own notarizer is off (notarize:false).
      - name: Package desktop app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter @midnite/desktop exec electron-builder ${{ matrix.eb }} --config electron-builder.yml --publish never

      # Upload the installers AND the electron-updater feed metadata — the running
      # app polls latest*.yml (+ *.blockmap) to detect and delta-download updates,
      # and macOS auto-update installs from the .zip (not the .dmg).
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            packages/desktop/build/*.dmg
            packages/desktop/build/*.exe
            packages/desktop/build/*.AppImage
            packages/desktop/build/*.zip
            packages/desktop/build/*.yml
            packages/desktop/build/*.blockmap
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Publish even when a single platform leg fails. The matrix is fail-fast:false,
    # so surviving OS builds still upload their installers; without this `if:` a
    # dependent job is skipped the moment any `needs` job fails, which is exactly
    # how a flaky macOS DMG build once blocked an *entire* release (win + linux were
    # green) from ever reaching the public downloads repo. `!cancelled()` still lets
    # an explicit cancel abort, and the guard step below fails loudly if truly
    # nothing built. A later re-run of the fixed leg re-runs this job and adds the
    # missing installers to the same release.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # A partial matrix (e.g. macOS flaked) still publishes, but an empty artifact
      # set must NOT create an assetless release — fail the job so the problem is
      # visible instead of silently shipping nothing.
      - name: Ensure at least one installer was produced
        shell: bash
        run: |
          count=$(find artifacts -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Downloaded $count artifact file(s) across all platform legs."
          if [ "$count" -eq 0 ]; then
            echo "::error::No installers were built on any platform — refusing to publish an empty release."
            exit 1
          fi

      # Publish to the PUBLIC downloads repo so the site's download links resolve
      # for anonymous visitors. The default GITHUB_TOKEN is scoped to THIS (private)
      # repo only; cross-repo publishing needs a fine-grained PAT with
      # Contents:write on bilo-io/midnite-app, stored as the RELEASES_REPO_TOKEN
      # secret. Published (not draft) so `releases/latest` resolves; the same-named
      # tag is auto-created in the public repo on its default branch.
      - name: Publish release to public downloads repo
        uses: softprops/action-gh-release@v2
        with:
          repository: bilo-io/midnite-app
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
